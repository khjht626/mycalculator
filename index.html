<!doctype html>
<html lang="zh-TW" class="h-full">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>計算機</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;700;900&amp;family=Outfit:wght@400;700;900&amp;display=swap" rel="stylesheet">
  <style>
    * { font-family: 'Outfit', 'Noto Sans TC', sans-serif; }
    .display {
      background: rgba(0,0,0,0.3);
      border: 2px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 20px;
      text-align: right;
      min-height: 80px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
    }
    .display-input {
      font-size: 28px;
      font-weight: 700;
      color: #facc15;
      word-wrap: break-word;
      word-break: break-all;
      min-height: 32px;
    }
    .display-result {
      font-size: 16px;
      color: rgba(255,255,255,0.6);
      margin-top: 8px;
      min-height: 20px;
    }
    .calc-btn {
      width: 100%;
      height: 60px;
      border-radius: 12px;
      border: none;
      font-size: 18px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.15s ease;
      user-select: none;
    }
    .calc-btn:active { transform: scale(0.95); }
    .num-btn {
      background: rgba(255,255,255,0.1);
      color: white;
    }
    .num-btn:hover { background: rgba(255,255,255,0.15); }
    .op-btn {
      background: rgba(250,204,21,0.2);
      color: #facc15;
      font-weight: 900;
    }
    .op-btn:hover { background: rgba(250,204,21,0.3); }
    .op-btn.active { background: #facc15; color: #1a1a2e; }
    .func-btn {
      background: rgba(74,222,128,0.2);
      color: #4ade80;
    }
    .func-btn:hover { background: rgba(74,222,128,0.3); }
    .clear-btn {
      background: rgba(248,113,113,0.2);
      color: #f87171;
    }
    .clear-btn:hover { background: rgba(248,113,113,0.3); }
  </style>
  <style>body { box-sizing: border-box; }</style>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
 </head>
 <body class="h-full">
  <div id="app" class="h-full w-full bg-gradient-to-br from-[#1a1a2e] via-[#16213e] to-[#0f3460] flex flex-col items-center justify-center p-4 overflow-auto">
   <div class="w-full max-w-sm mx-auto"><!-- Title -->
    <h1 id="title" class="text-3xl font-black text-center text-white mb-8 tracking-tight">計算機</h1><!-- Display -->
    <div class="display mb-6">
     <div class="display-input" id="display">
      0
     </div>
     <div class="display-result" id="preview"></div>
    </div><!-- Buttons Grid -->
    <div class="grid grid-cols-4 gap-3"><!-- Row 1 --> <button class="calc-btn clear-btn col-span-2" id="clearBtn">清除</button> <button class="calc-btn func-btn" id="backBtn"><i data-lucide="delete" style="width:20px;height:20px;display:inline-block;"></i></button> <button class="calc-btn op-btn" data-op="/">÷</button> <!-- Row 2 --> <button class="calc-btn num-btn" data-num="7">7</button> <button class="calc-btn num-btn" data-num="8">8</button> <button class="calc-btn num-btn" data-num="9">9</button> <button class="calc-btn op-btn" data-op="*">×</button> <!-- Row 3 --> <button class="calc-btn num-btn" data-num="4">4</button> <button class="calc-btn num-btn" data-num="5">5</button> <button class="calc-btn num-btn" data-num="6">6</button> <button class="calc-btn op-btn" data-op="-">−</button> <!-- Row 4 --> <button class="calc-btn num-btn" data-num="1">1</button> <button class="calc-btn num-btn" data-num="2">2</button> <button class="calc-btn num-btn" data-num="3">3</button> <button class="calc-btn op-btn" data-op="+">+</button> <!-- Row 5 --> <button class="calc-btn num-btn col-span-2" data-num="0">0</button> <button class="calc-btn num-btn" data-num=".">.</button> <button class="calc-btn func-btn" id="equalsBtn">=</button>
    </div>
   </div>
  </div>
  <script>
  const defaultConfig = {
    app_title: '計算機',
    background_color: '#1a1a2e',
    text_color: '#ffffff',
    accent_color: '#facc15',
    surface_color: '#ffffff1a',
    action_color: '#4ade80',
    font_family: 'Outfit',
    font_size: 16
  };

  let config = { ...defaultConfig };

  // Calculator state
  let display = '0';
  let input = '';
  let operator = null;
  let previousValue = null;
  let shouldResetDisplay = false;

  function updateDisplay() {
    document.getElementById('display').textContent = display || '0';
    updatePreview();
  }

  function updatePreview() {
    const preview = document.getElementById('preview');
    if (operator && previousValue !== null) {
      preview.textContent = `${previousValue} ${getOpSymbol(operator)}`;
    } else {
      preview.textContent = '';
    }
  }

  function getOpSymbol(op) {
    const symbols = { '+': '+', '-': '−', '*': '×', '/': '÷' };
    return symbols[op] || op;
  }

  function appendNumber(num) {
    if (shouldResetDisplay) {
      display = '';
      shouldResetDisplay = false;
    }

    if (num === '.') {
      if (display.includes('.')) return;
      if (display === '') display = '0';
    }

    display = display === '0' && num !== '.' ? num : display + num;
    input = display;
    updateDisplay();
  }

  function appendOperator(op) {
    if (display === '' && previousValue === null) return;

    if (previousValue !== null && operator && display !== '') {
      calculate();
    } else {
      previousValue = parseFloat(display) || 0;
    }

    operator = op;
    shouldResetDisplay = true;
    updatePreview();
  }

  function calculate() {
    if (operator === null || previousValue === null || display === '') return;

    const current = parseFloat(display);
    let result;

    switch (operator) {
      case '+': result = previousValue + current; break;
      case '-': result = previousValue - current; break;
      case '*': result = previousValue * current; break;
      case '/': result = current === 0 ? 0 : previousValue / current; break;
      default: return;
    }

    display = result % 1 === 0 ? result.toString() : result.toFixed(10).replace(/\.?0+$/, '');
    input = '';
    operator = null;
    previousValue = null;
    shouldResetDisplay = true;
    updateDisplay();
  }

  function clear() {
    display = '0';
    input = '';
    operator = null;
    previousValue = null;
    shouldResetDisplay = false;
    updateDisplay();
  }

  function backspace() {
    if (shouldResetDisplay) return;
    display = display.slice(0, -1) || '0';
    input = display;
    updateDisplay();
  }

  // Event listeners
  document.querySelectorAll('[data-num]').forEach(btn => {
    btn.addEventListener('click', () => appendNumber(btn.dataset.num));
  });

  document.querySelectorAll('[data-op]').forEach(btn => {
    btn.addEventListener('click', () => appendOperator(btn.dataset.op));
  });

  document.getElementById('equalsBtn').addEventListener('click', calculate);
  document.getElementById('clearBtn').addEventListener('click', clear);
  document.getElementById('backBtn').addEventListener('click', backspace);

  // Element SDK
  window.elementSdk.init({
    defaultConfig,
    onConfigChange: async (cfg) => {
      config = cfg;
      document.getElementById('title').textContent = cfg.app_title || defaultConfig.app_title;
      const font = cfg.font_family || defaultConfig.font_family;
      document.body.style.fontFamily = `${font}, 'Noto Sans TC', sans-serif`;
    },
    mapToCapabilities: (cfg) => ({
      recolorables: [
        { get: () => cfg.background_color || defaultConfig.background_color, set: (v) => { cfg.background_color = v; window.elementSdk.setConfig({ background_color: v }); } },
        { get: () => cfg.surface_color || defaultConfig.surface_color, set: (v) => { cfg.surface_color = v; window.elementSdk.setConfig({ surface_color: v }); } },
        { get: () => cfg.text_color || defaultConfig.text_color, set: (v) => { cfg.text_color = v; window.elementSdk.setConfig({ text_color: v }); } },
        { get: () => cfg.accent_color || defaultConfig.accent_color, set: (v) => { cfg.accent_color = v; window.elementSdk.setConfig({ accent_color: v }); } },
        { get: () => cfg.action_color || defaultConfig.action_color, set: (v) => { cfg.action_color = v; window.elementSdk.setConfig({ action_color: v }); } }
      ],
      borderables: [],
      fontEditable: { get: () => cfg.font_family || defaultConfig.font_family, set: (v) => { cfg.font_family = v; window.elementSdk.setConfig({ font_family: v }); } },
      fontSizeable: { get: () => cfg.font_size || defaultConfig.font_size, set: (v) => { cfg.font_size = v; window.elementSdk.setConfig({ font_size: v }); } }
    }),
    mapToEditPanelValues: (cfg) => new Map([
      ["app_title", cfg.app_title || defaultConfig.app_title]
    ])
  });

  updateDisplay();
  lucide.createIcons();
  </script>

</html>
